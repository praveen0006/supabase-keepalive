name: Supabase Keep-Alive

on:
  schedule:
    # Runs every day at 09:00 UTC — well inside the 7-day inactivity window
    - cron: "0 9 * * *"
  workflow_dispatch: {} # lets you trigger it manually from the Actions tab

jobs:
  ping-projects:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed to commit status.json back to the repo

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Ping all Supabase projects (with auto-resume)
        env:
          SUPABASE_PROJECTS: ${{ secrets.SUPABASE_PROJECTS }}
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: node keepalive.mjs

      - name: Commit status.json back to repo
        if: always()   # commit even if some pings failed, so dashboard stays updated
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add status.json
          git diff --cached --quiet || git commit -m "chore: update keepalive status [skip ci]"
          git push
