name: Supabase Keep-Alive

on:
  schedule:
    # Runs every Monday and Thursday at 09:00 UTC — well inside the 7-day window
    - cron: "0 9 * * 1,4"
  workflow_dispatch: {} # lets you trigger it manually from the Actions tab

jobs:
  ping-projects:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Ping all Supabase projects
        env:
          SUPABASE_PROJECTS: ${{ secrets.SUPABASE_PROJECTS }}
        run: node keepalive.mjs
